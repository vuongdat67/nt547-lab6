name: Slither Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  slither:
    name: Run Slither Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Slither
        run: pip install slither-analyzer solc-select

      - name: Install solc
        run: |
          solc-select install 0.8.20
          solc-select use 0.8.20

      - name: Run Slither
        run: slither yc1/BadVault.sol --json slither-report.json || true

      - name: Fail on High Severity
        run: |
          if grep -q '"impact": "High"' slither-report.json; then
            echo "High severity issues detected!"
            exit 1
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: slither-report.json