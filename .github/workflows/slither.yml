name: Slither Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  slither:
    name: Run Slither Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Slither
        uses: crytic/slither-action@v0.3.0
        id: slither
        with:
          target: 'yc1/BadVault.sol'
          slither-args: '--exclude-low --exclude-informational'
          fail-on: high   
      - name: Run Slither
        run: |
          slither . --json slither-report.json || true

      - name: Fail on High Severity
        run: |
          if grep -q '"impact": "High"' slither-report.json; then
            echo "High severity issues detected!"
            exit 1
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: slither-report.json
  